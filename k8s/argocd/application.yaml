apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eks-gitops-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/bwaife/EKS_Project
    targetRevision: main
    path: k8s/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: application
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true